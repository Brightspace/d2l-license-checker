name: CI
permissions:
  contents: read
on: pull_request
concurrency:
  group: ${{github.workflow_ref}}
  cancel-in-progress: true
jobs:
  determine-node-versions:
    name: Determine Node Versions
    timeout-minutes: 5
    runs-on: ubuntu-latest
    outputs:
      node-versions: ${{steps.gnv.outputs.node-versions}}
      nvmrc-version: ${{steps.gnv.outputs.nvmrc-version}}
    steps:
      - name: Checkout
        uses: Brightspace/third-party-actions@actions/checkout
      - name: Generate node versions
        id: gnv
        run: |
          NVMRC_VER=$(cat .nvmrc)
          VER=${NVMRC_VER%%.*}
          echo "node-versions=[\"$((VER-2))\",\"$VER\"]" >> $GITHUB_OUTPUT
          echo "nvmrc-version=$VER" >> $GITHUB_OUTPUT
  lint:
    name: Lint
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: Brightspace/third-party-actions@actions/checkout
      - name: Set up node
        uses: Brightspace/setup-node@main
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Lint (ESLint)
        run: npm run lint:eslint
      - name: Lint (EditorConfig)
        run: npm run lint:editorconfig
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: determine-node-versions
    strategy:
      fail-fast: false
      matrix:
        node: ${{fromJson(needs.determine-node-versions.outputs.node-versions)}}
    steps:
      - name: Checkout
        uses: Brightspace/third-party-actions@actions/checkout
      - name: Set up node
        uses: Brightspace/setup-node@main
        with:
          node-version: ${{matrix.node}}
          cache: npm
      - name: Disable engine-strict
        if: matrix.node != needs.determine-node-versions.outputs.nvmrc-version
        run: sed -i 's/engine-strict=true/engine-strict=false/' .npmrc
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
        env:
          TEST_LOGGING_VERBOSE: true
      - name: Report test results
        if: (!cancelled()) && github.actor != 'dependabot[bot]'
        uses: Brightspace/test-reporting-action@main
        with:
          aws-access-key-id: ${{secrets.AWS_ACCESS_KEY_ID}}
          aws-secret-access-key: ${{secrets.AWS_SECRET_ACCESS_KEY}}
          aws-session-token: ${{secrets.AWS_SESSION_TOKEN}}
  label:
    name: Label
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    timeout-minutes: 5
    steps:
      - name: Apply labels
        uses: Brightspace/third-party-actions@actions/labeler
